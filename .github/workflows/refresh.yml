name: Refresh Macro Data

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh market data
        run: |
          curl --fail-with-body -X GET "https://macro-dashboard-youngwoo.vercel.app/api/cron/refresh?scope=market" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}"

      - name: Refresh daily data
        run: |
          curl --fail-with-body -X GET "https://macro-dashboard-youngwoo.vercel.app/api/cron/refresh?scope=daily" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}"
