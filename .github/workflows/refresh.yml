name: Refresh Macro Data

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call refresh endpoint
        run: |
          curl -X POST "${{ secrets.REFRESH_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
