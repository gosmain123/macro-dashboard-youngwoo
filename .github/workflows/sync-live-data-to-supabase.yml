name: Sync Live Data to Supabase

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Refresh scope to sync into Supabase
        required: true
        default: all
        type: choice
        options:
          - all
          - market
          - daily
  schedule:
    - cron: "7,22,37,52 * * * *"
    - cron: "11 */3 * * *"

concurrency:
  group: sync-live-data-to-supabase
  cancel-in-progress: false

jobs:
  sync-live-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve sync scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            scope="${{ inputs.scope }}"
          elif [[ "${{ github.event.schedule }}" == "7,22,37,52 * * * *" ]]; then
            scope="market"
          else
            scope="daily"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Resolved sync scope: $scope"

      - name: Starting Supabase sync
        run: |
          echo "Starting Supabase sync"
          echo "Workflow: Sync Live Data to Supabase"
          echo "Scope: ${{ steps.scope.outputs.scope }}"

      - name: Run live data sync
        run: npm run sync:live-data -- ${{ steps.scope.outputs.scope }}
